{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% block meta %}
    {% endblock %}
    <title>{{title}}</title>
    <link rel="stylesheet" href="/static/plugins/fontawesomepro/css/all.min.css" />
    <link href="/static/plugins/bootstrap 5.0.2/bootstrap.min.css" rel="stylesheet">
    <link href="/static/plugins/aos/aos.css" rel="stylesheet" type="text/css"/>
    <link rel="stylesheet" href="/static/css/global.css" />
    {% block style %}
    {% endblock %}
    <script src="/static/js/jquery-3.6.3.min.js"></script>
    {% tailwind_css %}
</head>
<body>
    <div class="h-[100dvh] w-full">
        <div class="flex h-full">
            <div class="hidden lg:flex flex-col justify-center w-[55%] h-full relative ">
                <h1 class="text-center text-[#1b38e6] font-bold text-5xl mb-4">
                    W Express<br> Fleet Management System
    
                </h1>
                <img src="/static/image/bgg.png" class="w-full object-contain bg-primaryColor"/>
                <div class="absolute z-30 bottom-10 p-5" data-aos="fade-up" > 
                    <!-- <div class="text-3xl text-white w-[90%]">
                        Easy-to-use business management software for Dermatology and Aesthetic clinics.
                    </div> -->
                </div>
            </div>
            <div class="w-full lg:w-[45%] h-full py-20 md:p-0">
                <div class="grid place-items-center h-[95%]">
                    {% block content %}
                    {% endblock %}
                </div>
                <div class="h-[5%] flex justify-center">
                    COPYRIGHT  © 2023 W Express, All rights Reserved
                </div>
            </div> 
        </div> 
    </div>
    <script src="/static/plugins/bootstrap 5.0.2/bootstrap.bundle.min.js"></script>
    <script src="/static/plugins/sweetalert/sweetalert2.all.min.js"></script>
    <script src="/static/js/global.js"></script>
    <script src="/static/js/pagination_handler.js"></script>
    <script src="/static/plugins/aos/aos.js"></script> 

    <script src="/static/js/axios.min.js"></script>
    <script src="/static/js/api_request.js"></script> 
    <script> 
        setupAxios("{{csrf_token}}")
        AOS.init();  
    </script>
    {% block scripts %}
    {% endblock %}
</body>
</html>
