<div class="w-full">
    {% include 'components/tables/table1.html' with data=data_lists table_id=table_id %} 
</div>

<script>
    var request_data = {}
    {% if request_data %}
        request_data = {{request_data|safe}}
    {% endif %} 
    var {{table_id}}_handler = new TablePaginationHandler(
        subpageURL="{% url 'user:table_item_user_role' %}",
        tableID='{{table_id}}',
        columnCount="{{data_lists.column|length}}",
        parameters={ 
            is_hide_pagination:false,
            table_id: "{{table_id}}",
            ...request_data
        }
    )
</script>
