                            </div>
                        </div>
                        <div>
                            <div data-url="{% url 'user:subpage_srf_tfleet_approver' %}" data-tab="srf-tfleet" class="tab-nav cursor-pointer ">

                                    SRF-Manila  
                                </div>
                            </div>
                        </div>
                        <div class="LLRGS">
                            <div data-url="{% url 'user:subpage_vdf_approver' %}" data-tab="vdf" class="tab-nav  cursor-pointer ">
                                <div class="tab-item  p-3 mr-2 w-max">
                                    VDF-In General
                                </div> 
                            </div>
                        </div> 
                        <div>
                            <div data-url="{% url 'user:subpage_vdf_tfleet_approver' %}" data-tab="vdf-tfleet" class="tab-nav cursor-pointer ">
                                <div class="tab-item p-3 mr-2 w-max">

                            </div>
                        </div>
                        <!-- <div class="LLRGS">
                            <div data-url="{% url 'vehicle:provider' %}" data-tab="dov" class="tab-nav  cursor-pointer ">
                                <div class="tab-item  p-3 mr-2 w-max">
                                    Disposal of Vehicle Approver
                                </div> 
                            </div>
                        </div>  -->
                    </div>
                    <div id="tab-container" class="w-full ">
                    </div> 
                </div>  
            
        </div> 
    </div> 
</div> 

<!-- Modals --> 
{% endblock %}


{% block scripts %} 
<script>  

    if(window.location.hash) {
        var hash = window.location.hash.substring(1); //Puts hash in variable, and removes the # character
        $('#tab-container').loadSubpage({url: $(`div[data-tab=${hash}]`).attr('data-url')}) 
        $(`div[data-tab=${hash}]`).find('.tab-item').eq(0).addClass('active')
        $('#tab-name').html( $(`div[data-tab=${hash}]`).find(".tab-item").eq(0).html())
    } else { 
        $(`div[data-tab=srf]`).find('.tab-item').eq(0).addClass('active')
        $('#tab-container').loadSubpage({url: $(`div[data-tab=srf]`).attr('data-url')})   
        $('#tab-name').html('SRF-Manila')
    }
    
    $('.tab-nav').click(function() {
        $('.tab-item').removeClass('active')
        const url = $(this).data('url');
        window.location.hash = $(this).data('tab'); 
        $(this).find('.tab-item').eq(0).addClass('active')
        $('#tab-container').loadSubpage({url: url})
        $('#tab-name').html( $(this).find(".tab-item").eq(0).html())
    })   
     
</script> 

<script>
    $(document).on('click', '.remove-srf-approver', function(e){
        const urlString = $(this).data('url');
        const id = $(this).data('id');
        let status_label = ''
        
        Swal.fire({
            title: 'Are you sure?',
            text: "To " + $(this).html() + "this approver.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#3085d6',
            cancelButtonColor: '#d33',
            confirmButtonText: 'Yes'
        }).then((result) => {
            if (result.isConfirmed) {
                API.makePostRequest(
                    urlString,
                    { 
                        id:id
                    },
                    processData=() => {},
                    callback=(response)=>{
                        if ([200,201].includes(response.status)){
                            location.reload()
                        } else {
                            Swal.fire({
                                icon: [200,201].includes(response.status)?'success':'error',
                                title:  'Information',
                                text: response.message || response.data?.message,
                            })
                        }
                        

                    }
                ) 
            }
        })
        
    })
</script>
{% endblock %}
