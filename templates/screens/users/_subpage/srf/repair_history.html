{% load custom_filters %}
{% load custom_tags %}
 
<div class="col-xl-12 bg-white p-8 ">  
    <div class="row">
        <div class="col-xl-12 flex p-0"> 
            <div id="container_branch" class="bg-white rounded-md w-full permission-container">
            </div>
        </div>
    </div>  
</div>

<script>  
    $(document).ready(function(e){
        loadBranch();  
    }) 

    function loadBranch(){ 
        var query_params = urlParameterize({ 
            "id": "{{id}}"
        });
        
        $('#container_branch').loadSubpage({
            url: "{% url 'vehicle:table_srf_repair_history' %}?"+query_params,
        })
    }  
</script>
