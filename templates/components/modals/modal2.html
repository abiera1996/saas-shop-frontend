{% comment %}
    Variables
    - id:string 
    - modalSize:string modal-xl
    - title
    - description
    - modalBody

{% endcomment %}

<div class="modal fade" id="{{id}}" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="staticBackdropLabel" aria-hidden="true">
    <div class="modal-dialog {{modalSize}}">
        <div class="modal-content">
            <div class="modal-header border-none">
                <div class="modal-title ">
                    <h5 class="font-semibold text-xl text-black" id="staticBackdropLabel">{{title}}</h5>
                    <label class="text-xs">
                        {{description}}
                    </label>
                </div>
                
                <button type="button" class="btn-close text-black" data-bs-dismiss="modal" aria-label="Close"><i class="fal fa-times"></i></button>
            </div>
            <div class="modal-body p-0">
                {% include modalBody %}
            </div>
        </div>
    </div>
</div>
