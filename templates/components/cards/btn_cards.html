{% comment %}
    Variables
    - btn_id
    - value_string:string
    - title:string
    - value:string
    - class:string
    - icon
    - icon_color:string
    - customClass: True|False
    - custom_icon_size: True|False
    - icon_width
    - icon_height
{% endcomment %}


<button id="{{ btn_id }}" class=" {% if customClass %} {{ class }} {% else %} py-[35px] px-4 w-full text-left {{ class }} {% endif %} " data-value="{{ value_string }}">
    <div class="flex items-center">
        <div class="w-full text-sm flex-1">
            <div class="pr-3 text-lg">
                <div class="text-[#565656]">{{ title }}</div>
            </div>
            <div class="text-xl font-bold" id="{{ id }}">
                {% if value %}
                    {{ value }}
                {% else %}
                    <i class="text-dark fas fa-spinner fa-spin"></i>
                {% endif %}
            </div>
        </div>
        <div class="">
